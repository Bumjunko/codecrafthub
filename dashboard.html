<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCraftHub: Your Learning Management Platform</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f3ff;
      color: #1e1b4b;
      line-height: 1.6;
    }

    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --primary: #8B5CF6;
      --primary-dark: #7C3AED;
      --primary-light: #EDE9FE;
      --success: #F59E0B;
      --success-light: #FEF3C7;
      --delete: #EF4444;
      --delete-light: #FEE2E2;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --white: #FFFFFF;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
      --radius: 10px;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      padding: 1.5rem 2rem;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: .9rem; opacity: .85; margin-top: .25rem; }

    /* ── Container ─────────────────────────────────────────── */
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    /* ── Toast / Messages ──────────────────────────────────── */
    #toast {
      position: fixed; top: 1rem; right: 1rem; z-index: 1000;
      padding: .85rem 1.25rem; border-radius: var(--radius);
      color: var(--white); font-weight: 600; font-size: .9rem;
      box-shadow: var(--shadow-lg);
      transform: translateX(120%);
      transition: transform .35s ease;
    }
    #toast.show { transform: translateX(0); }
    #toast.success { background: var(--success); }
    #toast.error   { background: var(--delete); }

    /* ── Card wrapper ──────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1.15rem; margin-bottom: 1rem;
      color: var(--primary-dark);
      border-bottom: 2px solid var(--primary-light);
      padding-bottom: .5rem;
    }

    /* ── Form ──────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .85rem;
    }
    .form-grid .full { grid-column: 1 / -1; }

    label { display: block; font-size: .8rem; font-weight: 600; color: var(--gray-700); margin-bottom: .25rem; }

    input, select, textarea {
      width: 100%; padding: .6rem .75rem;
      border: 1px solid var(--gray-200);
      border-radius: 6px; font-size: .9rem;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(139,92,246,.15);
    }
    textarea { resize: vertical; min-height: 70px; }

    .btn {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .6rem 1.2rem; border: none; border-radius: 6px;
      font-size: .85rem; font-weight: 600; cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #8B5CF6; color: #FFFFFF; }
    .btn-success { background: #F59E0B; color: #FFFFFF; }
    .btn-danger  { background: var(--delete);  color: var(--white); }
    .btn-cancel  { background: var(--gray-200); color: var(--gray-700); }
    .btn-sm { padding: .4rem .75rem; font-size: .8rem; }

    .form-actions { grid-column: 1 / -1; display: flex; gap: .5rem; margin-top: .5rem; }

    /* ── Spinner ────────────────────────────────────────────── */
    .spinner-wrap { text-align: center; padding: 2rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid var(--primary-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Course Cards ──────────────────────────────────────── */
    .course-list { display: grid; gap: 1rem; }

    .course-item {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      border-left: 4px solid var(--primary);
      transition: box-shadow .2s;
    }
    .course-item:hover { box-shadow: var(--shadow-lg); }

    .course-item.status-completed  { border-left-color: #10B981; }
    .course-item.status-inprogress { border-left-color: var(--success); }

    .course-header { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; flex-wrap: wrap; }
    .course-header h3 { font-size: 1.05rem; color: var(--gray-700); }

    .badge {
      display: inline-block; padding: .2rem .65rem;
      border-radius: 20px; font-size: .75rem; font-weight: 600;
    }
    .badge-not-started { background: var(--primary-light); color: var(--primary-dark); }
    .badge-in-progress { background: var(--success-light); color: #92400E; }
    .badge-completed   { background: #D1FAE5; color: #065F46; }

    .course-desc { color: var(--gray-500); font-size: .9rem; margin: .5rem 0; }

    .course-meta { display: flex; gap: 1.25rem; font-size: .8rem; color: var(--gray-500); flex-wrap: wrap; }

    .course-actions { display: flex; gap: .4rem; margin-top: .75rem; }

    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--gray-500);
    }
    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: .5rem; }

    /* ── Modal ─────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 900;
      justify-content: center; align-items: center;
      padding: 1rem;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow-lg); padding: 1.5rem;
      width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { margin-bottom: 1rem; color: var(--primary-dark); }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- ═══════════ Header ═══════════ -->
<header>
  <h1>CodeCraftHub: Your Learning Management Platform</h1>
  <p>Track, manage, and master your learning journey</p>
</header>

<!-- ═══════════ Toast ═══════════ -->
<div id="toast"></div>

<div class="container">

  <!-- ═══════════ Add Course Form ═══════════ -->
  <div class="card">
    <h2>Add New Course</h2>
    <form id="addForm" class="form-grid">
      <div>
        <label for="name">Course Name *</label>
        <input type="text" id="name" placeholder="e.g. Python Basics" required />
      </div>
      <div>
        <label for="status">Status *</label>
        <select id="status" required>
          <option value="">Select status</option>
          <option value="Not Started">Not Started</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div>
        <label for="target_date">Target Date *</label>
        <input type="date" id="target_date" required />
      </div>
      <div class="full">
        <label for="description">Description *</label>
        <textarea id="description" placeholder="Brief description of the course" required></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="addBtn">+ Add Course</button>
      </div>
    </form>
  </div>

  <!-- ═══════════ Course List ═══════════ -->
  <div class="card">
    <h2>My Courses</h2>
    <div id="courseList"></div>
  </div>
</div>

<!-- ═══════════ Edit Modal ═══════════ -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>Edit Course</h2>
    <form id="editForm" class="form-grid">
      <input type="hidden" id="editId" />
      <div>
        <label for="editName">Course Name *</label>
        <input type="text" id="editName" required />
      </div>
      <div>
        <label for="editStatus">Status *</label>
        <select id="editStatus" required>
          <option value="Not Started">Not Started</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <div>
        <label for="editTargetDate">Target Date *</label>
        <input type="date" id="editTargetDate" required />
      </div>
      <div class="full">
        <label for="editDescription">Description *</label>
        <textarea id="editDescription" required></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-success">Save Changes</button>
        <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  // ── Configuration ──────────────────────────────────────
  const API_URL = "http://localhost:5000/api/courses";

  // ── DOM references ─────────────────────────────────────
  const addForm    = document.getElementById("addForm");
  const addBtn     = document.getElementById("addBtn");
  const courseList  = document.getElementById("courseList");
  const editModal   = document.getElementById("editModal");
  const editForm    = document.getElementById("editForm");
  const toast       = document.getElementById("toast");

  // ── Toast notifications ────────────────────────────────
  function showToast(message, type) {
    toast.textContent = message;
    toast.className = type + " show";
    setTimeout(() => { toast.classList.remove("show"); }, 3000);
  }

  // ── Loading / Empty states ─────────────────────────────
  function showLoading() {
    courseList.innerHTML =
      '<div class="spinner-wrap"><div class="spinner"></div><p>Loading courses...</p></div>';
  }

  function showEmpty() {
    courseList.innerHTML =
      '<div class="empty-state"><span>📚</span><p>No courses yet. Add your first course above!</p></div>';
  }

  // ── Format date for display ────────────────────────────
  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
  }

  // ── Badge class helper ─────────────────────────────────
  function badgeClass(status) {
    if (status === "Completed")  return "badge-completed";
    if (status === "In Progress") return "badge-in-progress";
    return "badge-not-started";
  }

  function itemClass(status) {
    if (status === "Completed")   return "status-completed";
    if (status === "In Progress") return "status-inprogress";
    return "";
  }

  // ── Fetch all courses ──────────────────────────────────
  async function fetchCourses() {
    showLoading();
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error("Failed to fetch courses");
      const courses = await res.json();

      if (courses.length === 0) { showEmpty(); return; }

      courseList.innerHTML = '<div class="course-list">' +
        courses.map(c => `
          <div class="course-item ${itemClass(c.status)}">
            <div class="course-header">
              <h3>${esc(c.name)}</h3>
              <span class="badge ${badgeClass(c.status)}">${esc(c.status)}</span>
            </div>
            <p class="course-desc">${esc(c.description)}</p>
            <div class="course-meta">
              <span>🎯 Target: ${fmtDate(c.target_date)}</span>
              <span>📅 Created: ${fmtDate(c.created_at)}</span>
            </div>
            <div class="course-actions">
              <button class="btn btn-success btn-sm" onclick="openEdit(${c.id})">✏️ Edit</button>
              <button class="btn-danger" onclick="handleDelete(${c.id})">Remove</button>
            </div>
          </div>
        `).join("") +
        '</div>';
    } catch (err) {
      showToast(err.message, "error");
      courseList.innerHTML = '<div class="empty-state"><span>⚠️</span><p>Could not load courses. Is the backend running?</p></div>';
    }
  }

  // ── Escape HTML to prevent XSS ─────────────────────────
  function esc(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  // ── Create course ──────────────────────────────────────
  addForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const name        = document.getElementById("name").value.trim();
    const description = document.getElementById("description").value.trim();
    const target_date = document.getElementById("target_date").value;
    const status      = document.getElementById("status").value;

    if (!name || !description || !target_date || !status) {
      showToast("Please fill in all required fields", "error");
      return;
    }

    addBtn.disabled = true;
    addBtn.textContent = "Adding...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description, target_date, status }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to add course");

      showToast("Course added successfully!", "success");
      addForm.reset();
      fetchCourses();
    } catch (err) {
      showToast(err.message, "error");
    } finally {
      addBtn.disabled = false;
      addBtn.textContent = "+ Add Course";
    }
  });

  // ── Open edit modal ────────────────────────────────────
  async function openEdit(id) {
    try {
      const res = await fetch(`${API_URL}/${id}`);
      if (!res.ok) throw new Error("Course not found");
      const c = await res.json();

      document.getElementById("editId").value          = c.id;
      document.getElementById("editName").value         = c.name;
      document.getElementById("editDescription").value  = c.description;
      document.getElementById("editTargetDate").value   = c.target_date;
      document.getElementById("editStatus").value       = c.status;
      editModal.classList.add("active");
    } catch (err) {
      showToast(err.message, "error");
    }
  }

  function closeModal() { editModal.classList.remove("active"); }

  // Close modal when clicking outside
  editModal.addEventListener("click", (e) => {
    if (e.target === editModal) closeModal();
  });

  // ── Update course ──────────────────────────────────────
  editForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const id          = document.getElementById("editId").value;
    const name        = document.getElementById("editName").value.trim();
    const description = document.getElementById("editDescription").value.trim();
    const target_date = document.getElementById("editTargetDate").value;
    const status      = document.getElementById("editStatus").value;

    if (!name || !description || !target_date || !status) {
      showToast("Please fill in all required fields", "error");
      return;
    }

    try {
      const res = await fetch(`${API_URL}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description, target_date, status }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to update course");

      showToast("Course updated successfully!", "success");
      closeModal();
      fetchCourses();
    } catch (err) {
      showToast(err.message, "error");
    }
  });

  // ── Delete course ──────────────────────────────────────
  async function deleteCourse(id) {
    if (!confirm("Are you sure you want to remove this course?")) return;

    try {
      const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to delete course");

      showToast("Course removed successfully!", "success");
      fetchCourses();
    } catch (err) {
      showToast(err.message, "error");
    }
  }

  // ── Initial load ───────────────────────────────────────
  fetchCourses();
</script>
</body>
</html>
